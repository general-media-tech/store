<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <title>General Media Tech - Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#C41230', light: '#F5F5F5', dark: '#111111' },
                    fontFamily: { sans: ['Tajawal', 'sans-serif'] },

                }
            }
        }

    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .img-blend { mix-blend-mode: multiply; }

        /* ── modal slide-in from right ── */
        .modal-overlay {
            position: fixed; inset: 0; background: #fff; z-index: 100;
            display: flex; justify-content: center;
            transform: translateX(100%);
            transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
            pointer-events: none;
        }
        .modal-overlay.active { transform: translateX(0); pointer-events: auto; }
        .modal-sheet { width: 100%; max-width: 480px; height: 100%; background: #fff; display: flex; flex-direction: column; overflow: hidden; }

        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }

        /* ── banners ── */
        .banner-slide { display: none; }
        .banner-slide.active { display: flex; }
        .dot-active { background-color: #C41230 !important; width: 20px !important; }

        /* ── animations ── */
        @keyframes fadeInUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
        .fade-in-up { animation: fadeInUp 0.4s ease both; }
        @keyframes cartPulse { 0%{transform:scale(1)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }
        .cart-add-anim { animation: cartPulse 0.3s ease; }

        /* ── cart button states ── */
        .cart-btn-view {
            background: #111111 !important;
            color: #fff !important;
        }

        /* ── category section banner — floating slider ── */
        .cat-section-banner {
            width: calc(100% - 32px);
            margin: 0 16px 20px 16px;
            border-radius: 18px;
            overflow: hidden;
            position: relative;
            /* floating effect */
            box-shadow:
                0 4px 6px rgba(0,0,0,0.05),
                0 10px 20px rgba(0,0,0,0.10),
                0 20px 40px rgba(0,0,0,0.07);
            border: 1px solid rgba(255,255,255,0.9);
            background: #f5f5f5;
        }
        .cat-section-banner img {
            width: 100%; height: 100%;
            object-fit: cover; display: block;
        }
        .cat-banner-slide { display: none; }
        .cat-banner-slide.active { display: block; }
        .cat-banner-dots {
            position: absolute; bottom: 8px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 5px; z-index: 5;
        }
        .cat-banner-dot {
            height: 5px; border-radius: 99px;
            background: rgba(255,255,255,0.6);
            transition: all 0.3s; cursor: pointer; width: 5px;
        }
        .cat-banner-dot.active {
            background: #fff; width: 14px;
        }

        /* ── intro screen ── */
        #intro-screen {
            position: fixed; inset: 0; z-index: 9999;
            background: #ffffff;
            display: flex; flex-direction: column;
            align-items: center; justify-content: space-between;
            padding: 8vh 24px 5vh 24px;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        #intro-screen.hide { opacity: 0; visibility: hidden; pointer-events: none; }
        .intro-spacer { flex: 1; }
        .intro-main-center { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 400px; }
        .intro-brand-logo { width: 180px; height: auto; opacity: 0; animation: smoothFadeUp 1s cubic-bezier(0.25, 1, 0.5, 1) 0.1s forwards; }
        .premium-loader-track { width: 140px; height: 2px; background: #f0f0f0; border-radius: 4px; overflow: hidden; position: relative; margin: 32px 0 24px 0; opacity: 0; animation: smoothFadeUp 1s cubic-bezier(0.25,1,0.5,1) 0.4s forwards; }
        .premium-loader-runner { position: absolute; top: 0; left: 0; bottom: 0; width: 30%; background: #C41230; border-radius: 4px; animation: loaderRun 1.4s cubic-bezier(0.4,0,0.2,1) infinite; }
        .intro-welcome { font-size: 14px; font-weight: 500; color: #333333; letter-spacing: 0.5px; text-align: center; opacity: 0; animation: smoothFadeUp 1s cubic-bezier(0.25,1,0.5,1) 0.6s forwards; }
        .intro-partners-container { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; width: 100%; opacity: 0; animation: smoothFadeUp 1s cubic-bezier(0.25,1,0.5,1) 0.9s forwards; }
        .intro-partners-row { display: flex; align-items: center; justify-content: center; gap: 28px; width: 100%; }
        .intro-partners-row img { height: 18px; object-fit: contain; filter: grayscale(100%) opacity(0.4); transition: filter 0.3s ease; }
        @keyframes smoothFadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
        @keyframes loaderRun { 0%{transform:translateX(-150%);} 100%{transform:translateX(350%);} }

        /* ── offers section ── */
        .offer-card { background:white; border-radius:18px; overflow:hidden; box-shadow:0 8px 28px rgba(0,0,0,0.10); margin-bottom:16px; cursor:pointer; transition:transform 0.2s; }
        .offer-card:active { transform:scale(0.98); }
        .offer-badge { position:absolute; top:12px; right:12px; background:#C41230; color:white; font-size:11px; font-weight:700; padding:4px 10px; border-radius:99px; }
        .offer-expired { filter:grayscale(0.6); opacity:0.7; }
        
        /* ── invoice ── */
        #invoice-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:500; display:flex; align-items:flex-end; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.3s; }
        #invoice-overlay.active { opacity:1; pointer-events:auto; }
        #invoice-sheet { background:white; width:100%; max-width:480px; border-radius:20px 20px 0 0; max-height:92vh; overflow-y:auto; transform:translateY(100%); transition:transform 0.35s cubic-bezier(0.32,0.72,0,1); }
        #invoice-overlay.active #invoice-sheet { transform:translateY(0); }
        
        /* ── notification prompt ── */
        #notif-prompt { position:fixed; bottom:80px; left:16px; right:16px; background:white; border-radius:16px; padding:16px; box-shadow:0 8px 32px rgba(0,0,0,0.15); z-index:400; transform:translateY(20px); opacity:0; transition:all 0.4s cubic-bezier(0.32,0.72,0,1); pointer-events:none; border:1px solid #f0f0f0; }
        #notif-prompt.show { transform:translateY(0); opacity:1; pointer-events:auto; }
        
        /* ── similar products ── */
        .similar-section { border-top:1px solid #f0f0f0; padding-top:16px; margin-top:8px; }
    </style>
</head>

<script>
// ═══════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════
const CONFIG = {
    SUPABASE_URL:       'https://tupldwylzrkjzqtaiscv.supabase.co',
    SUPABASE_ANON_KEY:  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR1cGxkd3lsenJranpxdGFpc2N2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0OTEzNTQsImV4cCI6MjA5MTA2NzM1NH0.RKsdAg4v7TcuMhBepztJtRdTtsR-f8cMcoDXKmnZXO0',
    TABLE_STORE:        'gmt_store',
    TABLE_COMMENTS:     'gmt_comments',
    JSONBIN_API_KEY:    '$2a$10$vC0Evv1i72n9vOlH36x.2Ot9Nt2Pz4ToGhm4mdcEx69Lb/TzYlpOe',
    ORDERS_BIN_ID:      '69adf58dd0ea881f40fdbe19',
    TELEGRAM_BOT_TOKEN: '8608745716:AAEfP5Oh_AdALuPcHMhLVsULRvqc59q2e-0',
    TELEGRAM_CHAT_ID:   '-1003815557954',
    WHATSAPP_NUMBER:    '963939773715',
    CURRENCY:           '$',
    LOCATION_URL:       '...'
};

const _sb = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

// ── MOCK fallback ──────────────────────────────
const MOCK = {
    categories: [
        { id:'c1', name:'عدسات',   icon:'ph-aperture',           order:1, image:'' },
        { id:'c2', name:'كاميرات', icon:'ph-camera',             order:2, image:'' },
        { id:'c3', name:'ترايبود', icon:'ph-compass',            order:3, image:'' },
        { id:'c4', name:'إضاءة',   icon:'ph-lightbulb-filament', order:4, image:'' }
    ],
    products: [
        { id:'p1', category_id:'c4', category_ids:['c4'], name:'كشاف ليد برو استوديو', price:639, images:['https://images.unsplash.com/photo-1588661706680-e37456d9acdf?w=300&q=80'], order:1 },
        { id:'p2', category_id:'c2', category_ids:['c2'], name:'كاميرا Canon EOS R5',  price:3899, images:['https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=300&q=80'], order:1 }
    ],
    banners: [{ id:'b1', title:'Canon', image:'https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=400&q=80', link:'' }],
    comments: []
};

// ── STORE STATE ────────────────────────────────
let store = {
    categories: [],
    products:   [],
    banners:    [],
    offers:     [],
    cart: JSON.parse(localStorage.getItem('gmt_cart') || '[]')
};

// ── CACHE ──────────────────────────────────────
const CACHE_TTL = 5 * 60 * 1000;
const _cache = {
    get(k) { try { const r = localStorage.getItem('sbc_'+k); if(!r) return null; const {ts,d} = JSON.parse(r); if(Date.now()-ts>CACHE_TTL){localStorage.removeItem('sbc_'+k);return null;} return d; } catch{return null;} },
    set(k,d){ try{localStorage.setItem('sbc_'+k, JSON.stringify({ts:Date.now(),d}));}catch{} },
    del(k)  { try{localStorage.removeItem('sbc_'+k);}catch{} }
};

// ── SUPABASE ───────────────────────────────────
async function fetchStoreRecord() {
    const cached = _cache.get('store');
    if (cached) return cached;
    try {
        const {data,error} = await _sb.from(CONFIG.TABLE_STORE).select('*').eq('id',1).single();
        if (error) throw error;
        _cache.set('store', data);
        return data;
    } catch(e) { console.warn('fetchStore:', e.message); return null; }
}

async function fetchComments() {
    const cached = _cache.get('comments');
    if (cached) return cached;
    try {
        const {data,error} = await _sb.from(CONFIG.TABLE_COMMENTS).select('*').order('created_at',{ascending:false});
        if(error) throw error;
        _cache.set('comments', data||[]);
        return data||[];
    } catch { return []; }
}
async function insertComment(data) {
    try { const {error} = await _sb.from(CONFIG.TABLE_COMMENTS).insert([data]); if(error)throw error; _cache.del('comments'); return true; }
    catch { return false; }
}

// JSONBin orders
async function _jbFetch(binId) {
    if(!binId||binId==='...') return null;
    try { const r=await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`,{headers:{'X-Master-Key':CONFIG.JSONBIN_API_KEY}}); if(!r.ok)throw new Error('HTTP '+r.status); const d=await r.json(); return d.record; }
    catch { return null; }
}
async function _jbUpdate(binId,key,newData) {
    if(!binId||binId==='...') return true;
    try { const cur=await _jbFetch(binId)||{}; const merged={...cur,[key]:newData}; const r=await fetch(`https://api.jsonbin.io/v3/b/${binId}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':CONFIG.JSONBIN_API_KEY},body:JSON.stringify(merged)}); return r.ok; }
    catch { return false; }
}
async function insertOrder(orderData) {
    try { const rec=await _jbFetch(CONFIG.ORDERS_BIN_ID); const orders=Array.isArray(rec?.orders)?rec.orders:[]; orders.push(orderData); return await _jbUpdate(CONFIG.ORDERS_BIN_ID,'orders',orders); }
    catch { return false; }
}

async function sendTG(msg) {
    if(!CONFIG.TELEGRAM_BOT_TOKEN||CONFIG.TELEGRAM_BOT_TOKEN==='...') return;
    try { await fetch(`https://api.telegram.org/bot${CONFIG.TELEGRAM_BOT_TOKEN}/sendMessage`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:CONFIG.TELEGRAM_CHAT_ID,text:msg,parse_mode:'HTML'})}); }
    catch {}
}

// ══════════════════════════════════════════════
// [1] MAIN BANNER — single slider at the top
// ══════════════════════════════════════════════
let _bannerInterval=null, _curBanner=0;

function renderMainBanner(banners) {
    const slider = document.getElementById('main-banner-slider');
    const dots   = document.getElementById('main-banner-dots');
    if (!banners?.length) { document.getElementById('main-banner-section').style.display='none'; return; }
    slider.innerHTML = ''; dots.innerHTML = '';

    banners.forEach((b,i) => {
        const slide = document.createElement('div');
        slide.className = `banner-slide ${i===0?'active':''} w-full h-full absolute inset-0`;
        if (b.link) { slide.style.cursor='pointer'; slide.onclick=()=>window.open(b.link,'_blank'); }
        if (b.image) {
            const img = document.createElement('img');
            img.src = b.image; img.alt = b.title||'';
            img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
            slide.appendChild(img);
        }
        if (b.title) {
            const lbl = document.createElement('div');
            lbl.className = 'absolute bottom-0 inset-x-0 bg-gradient-to-t from-black/50 to-transparent p-3';
            lbl.innerHTML = `<p class="text-white text-sm font-bold">${b.title}</p>`;
            slide.appendChild(lbl);
        }
        slider.appendChild(slide);

        const dot = document.createElement('div');
        dot.className = `h-2 rounded-full bg-gray-300 transition-all duration-300 cursor-pointer ${i===0?'dot-active':'w-2'}`;
        dot.onclick = e => { e.stopPropagation(); _goToBanner(i); };
        dots.appendChild(dot);
    });
    slider.appendChild(dots);
    if (banners.length > 1) {
        clearInterval(_bannerInterval);
        _bannerInterval = setInterval(() => _goToBanner((_curBanner+1) % banners.length), 4000);
    }
}

function _goToBanner(idx) {
    const slider = document.getElementById('main-banner-slider');
    const slides = slider.querySelectorAll('.banner-slide');
    const dotEls = document.getElementById('main-banner-dots').children;
    slides.forEach((s,i) => s.classList.toggle('active', i===idx));
    Array.from(dotEls).forEach((d,i) => { d.classList.toggle('dot-active',i===idx); d.classList.toggle('w-5',i===idx); d.classList.toggle('w-2',i!==idx); });
    _curBanner = idx;
}

// ══════════════════════════════════════════════
// [2] CATEGORIES
// ══════════════════════════════════════════════
function renderCategories() {
    const container = document.querySelector('[data-container="categories"]');
    const frag = document.createDocumentFragment();
    [...store.categories].sort((a,b)=>(a.order||0)-(b.order||0)).forEach(cat => {
        const el = document.createElement('div');
        el.className = 'min-w-[95px] h-[100px] bg-white rounded-[18px] flex flex-col items-center justify-center gap-2 flex-shrink-0 cursor-pointer hover:border-primary/30 transition-all fade-in-up';
        el.style.cssText = 'box-shadow:0 4px 16px rgba(0,0,0,0.08),0 1px 4px rgba(0,0,0,0.04);';
        const displayName = cat.short_name || cat.name;
        // Use object-fit:cover for category images (PNG) to fill card completely
        const icon = cat.image
            ? `<div style="width:100%;height:68px;overflow:hidden;border-radius:10px 10px 0 0;background:#f5f5f5;"><img src="${cat.image}" style="width:100%;height:100%;object-fit:cover;display:block;" alt="${displayName}"></div>`
            : `<div class="flex items-center justify-center" style="height:68px;"><i class="ph ${cat.icon||'ph-squares-four'} text-[32px] text-primary"></i></div>`;
        el.innerHTML = `${icon}<span class="text-[11px] font-medium text-center leading-tight px-1 pb-1">${displayName}</span>`;
        // Adjust card style for image-based cards

        el.onclick = () => {
            const s = document.querySelector(`[data-category-section="${cat.id}"]`);
            if (s) s.scrollIntoView({behavior:'smooth',block:'start'});
        };
        frag.appendChild(el);
    });

}

// ══════════════════════════════════════════════
// [3] PRODUCTS — multi-category support
//     Each category section: title → section banner → products row
// ══════════════════════════════════════════════
function _getProductCategories(prod) {
    // Support both old category_id and new category_ids array
    if (Array.isArray(prod.category_ids) && prod.category_ids.length) return prod.category_ids;
    if (prod.category_id) return [prod.category_id];
    return [];
}

function renderProducts() {
    const container = document.querySelector('[data-container="products-area"]');
    const frag = document.createDocumentFragment();

    [...store.categories].sort((a,b)=>(a.order||0)-(b.order||0)).forEach(cat => {
        // collect products for this category
        const prods = store.products
            .filter(p => _getProductCategories(p).includes(cat.id))
            .sort((a,b) => {
                // per-category order support
                const oa = (a.category_orders && a.category_orders[cat.id]) ?? (a.order||0);
                const ob = (b.category_orders && b.category_orders[cat.id]) ?? (b.order||0);
                return oa - ob;
            });
        if (!prods.length) return;

        const section = document.createElement('section');
        section.className = 'mt-6';
        section.dataset.categorySection = cat.id;

        // ── Section header ──
        const header = document.createElement('h3');
        header.className = 'font-medium text-[18px] px-4 mb-4';
        header.textContent = cat.name;
        section.appendChild(header);

        // ── [2] Section banner slider (per-category) ──
        const catBanners = Array.isArray(cat.banners) && cat.banners.length
            ? cat.banners
            : (cat.banner_image ? [{ image: cat.banner_image, link: cat.banner_link||'' }] : []);

        if (catBanners.length) {
            const bannerWrap = document.createElement('div');
            bannerWrap.className = 'cat-section-banner';
            bannerWrap.style.minHeight = '120px';

            catBanners.forEach((b, bi) => {
                const slide = document.createElement('div');
                slide.className = 'cat-banner-slide' + (bi===0?' active':'');
                if (b.link) { slide.style.cursor='pointer'; slide.onclick=()=>window.open(b.link,'_blank'); }
                const img = document.createElement('img');
                img.src = b.image; img.alt = '';
                slide.appendChild(img);
                bannerWrap.appendChild(slide);
            });

            if (catBanners.length > 1) {
                // dots
                const dotsWrap = document.createElement('div');
                dotsWrap.className = 'cat-banner-dots';
                catBanners.forEach((_,bi) => {
                    const dot = document.createElement('div');
                    dot.className = 'cat-banner-dot' + (bi===0?' active':'');
                    dot.onclick = () => _goToCatBanner(bannerWrap, bi);
                    dotsWrap.appendChild(dot);
                });
                bannerWrap.appendChild(dotsWrap);
                // auto-slide
                let _idx = 0;
                const _timer = setInterval(() => {
                    _idx = (_idx+1) % catBanners.length;
                    _goToCatBanner(bannerWrap, _idx);
                }, 4000);
                bannerWrap._timer = _timer;
            }
            section.appendChild(bannerWrap);
        }

        // ── Products row ──
        const row = document.createElement('div');
        row.className = 'flex overflow-x-auto hide-scrollbar gap-4 px-4 pb-6';

        prods.forEach(prod => {
            row.appendChild(_buildProductCard(prod));
        });

        section.appendChild(row);
        frag.appendChild(section);
    });

    container.innerHTML = ''; container.appendChild(frag);
}

// ── Cat section banner slider helper ─────────────
function _goToCatBanner(wrap, idx) {
    const slides = wrap.querySelectorAll('.cat-banner-slide');
    const dots   = wrap.querySelectorAll('.cat-banner-dot');
    slides.forEach((s,i) => s.classList.toggle('active', i===idx));
    dots.forEach((d,i)   => d.classList.toggle('active', i===idx));
}

// ── Build one product card ─────────────────────
function _buildProductCard(prod) {
    const imgUrl = prod.images?.[0] || '';
    const displayName = prod.short_name || prod.name;
    const inCart = _isInCart(prod.id);

    const card = document.createElement('div');
    card.className = 'min-w-[160px] w-[160px] rounded-[20px] overflow-hidden flex flex-col flex-shrink-0 fade-in-up bg-white';
    card.style.cssText = 'cursor:pointer; box-shadow:0 8px 28px rgba(0,0,0,0.12),0 2px 6px rgba(0,0,0,0.07);';

    // image wrap
    const imgWrap = document.createElement('div');
    imgWrap.className = 'relative w-full overflow-hidden flex-shrink-0';
    imgWrap.style.height = '160px';
    imgWrap.style.background = '#f5f5f5';

    if (imgUrl) {
        const img = document.createElement('img');
        img.src = imgUrl;
        img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
        img.onerror = function(){ this.parentElement.innerHTML='<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center"><i class="ph ph-image" style="font-size:2.5rem;color:#d1d5db"></i></div>'; };
        imgWrap.appendChild(img);
    } else {
        imgWrap.innerHTML = '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center"><i class="ph ph-image" style="font-size:2.5rem;color:#d1d5db"></i></div>';
    }

    // [6] Cart button with view-cart behaviour
    const cartBtn = document.createElement('button');
    cartBtn.className = 'quick-cart-btn absolute top-2 left-2 w-9 h-9 rounded-[12px] flex items-center justify-center transition-all';
    cartBtn.style.cssText = 'background:rgba(255,255,255,0.92);backdrop-filter:blur(4px);box-shadow:0 2px 8px rgba(0,0,0,0.15);';
    _setCardCartBtn(cartBtn, inCart);

    cartBtn.addEventListener('click', e => {
        e.stopPropagation();
        if (_isInCart(prod.id)) {
            // already in cart → open cart
            renderCartItems(); openModal('cart-modal');
        } else {
            _quickAddToCart(prod, cartBtn);
        }
    });

    imgWrap.appendChild(cartBtn);
    card.appendChild(imgWrap);

    // info
    const info = document.createElement('div');
    info.className = 'p-3 flex flex-col gap-1';
    info.innerHTML = `<h4 class="text-[13px] font-medium text-dark leading-snug line-clamp-2">${displayName}</h4><span class="text-primary font-bold text-[15px] mt-1" dir="ltr">${CONFIG.CURRENCY}${parseFloat(prod.price||0).toFixed(2)}</span>`;
    card.appendChild(info);

    card.addEventListener('click', () => openProductModal(prod.id));
    return card;
}

function _setCardCartBtn(btn, inCart) {
    if (inCart) {
        btn.innerHTML = '<i class="ph ph-shopping-bag text-[16px]" style="color:#fff"></i>';
        btn.style.background = '#111111';
    } else {
        btn.innerHTML = '<i class="ph ph-shopping-bag-open text-[18px]" style="color:#C41230"></i>';
        btn.style.background = 'rgba(255,255,255,0.92)';
    }
}

// ══════════════════════════════════════════════
// [6] CART LOGIC
// ══════════════════════════════════════════════
function _isInCart(prodId) {
    return store.cart.some(i => (i._cartId || i.id) === prodId || (i._cartId||'').startsWith(prodId));
}

function _quickAddToCart(prod, btnEl) {
    const rawStock = prod.stock !== undefined ? parseInt(prod.stock) : 0;
    const stock = (rawStock && rawStock > 0) ? rawStock : 9999;
    const cid = prod.id;
    const ex = store.cart.find(i => i._cartId === cid);
    if (ex) {
        const nq = (ex.qty||1)+1;
        if (nq > stock) { showToast(`الحد الأقصى (${stock})`,'error'); return; }
        ex.qty = nq;
    } else {
        store.cart.push({...prod, _cartId:cid, price:parseFloat(prod.price||0), qty:1});
    }
    localStorage.setItem('gmt_cart', JSON.stringify(store.cart));
    updateCartBadge();

    // Switch button to "view cart"
    if (btnEl) _setCardCartBtn(btnEl, true);
    showToast('تمت الإضافة للسلة ✓','success');
}

function updateCartBadge() {
    const badge = document.querySelector('[data-element="cart-badge"]');
    const count = store.cart.reduce((s,i)=>s+(i.qty||1),0);
    if (count > 0) { badge.textContent = count>99?'99+':count; badge.classList.remove('hidden'); badge.classList.add('cart-add-anim'); setTimeout(()=>badge.classList.remove('cart-add-anim'),300); }
    else badge.classList.add('hidden');
    localStorage.setItem('gmt_cart', JSON.stringify(store.cart));
    _refreshAllCartBtns();
}

function _refreshAllCartBtns() {
    // update all visible quick-cart buttons
    document.querySelectorAll('.quick-cart-btn').forEach(btn => {
        const card = btn.closest('[style*="cursor:pointer"]') || btn.closest('.min-w-\\[160px\\]');
        // We tag each btn with data-prod-id for easy lookup
        const pid = btn.dataset.prodId;
        if (pid) _setCardCartBtn(btn, _isInCart(pid));
    });
}

function removeFromCart(id) { store.cart = store.cart.filter(i=>(i._cartId||i.id)!==id); updateCartBadge(); renderCartItems(); }

function renderCartItems() {
    const c   = document.getElementById('cart-items');
    const tot = document.getElementById('cart-total');
    if (!c) return;
    if (!store.cart.length) {
        c.innerHTML = `<div class="text-center py-10 flex flex-col items-center gap-3"><i class="ph ph-shopping-bag text-5xl text-gray-200"></i><p class="text-gray-400 text-sm">السلة فارغة</p></div>`;
        if(tot) tot.textContent=`0 ${CONFIG.CURRENCY}`; return;
    }
    let total=0; c.innerHTML='';
    store.cart.forEach(item => {
        total += (parseFloat(item.price)||0)*(item.qty||1);
        const cid = item._cartId||item.id;
        const vt  = item.selectedVariants?.map(v=>v.name||v.value||'').filter(Boolean).join(' · ')||'';
        const d   = document.createElement('div');
        d.className = 'flex justify-between items-center bg-light p-3 rounded-[12px]';
        d.innerHTML = `<div class="flex gap-3 items-center flex-1 min-w-0">
            <div class="w-10 h-10 bg-white rounded-[8px] flex items-center justify-center flex-shrink-0 overflow-hidden">
                ${item.images?.[0]?`<img src="${item.images[0]}" class="w-full h-full object-contain img-blend">`:`<i class="ph ph-image text-gray-300"></i>`}
            </div>
            <div class="flex flex-col min-w-0">
                <span class="text-sm font-medium line-clamp-1">${item.name}</span>
                ${vt?`<span class="text-[11px] text-gray-400">${vt}</span>`:''}
                <div class="flex items-center gap-2 mt-1">
                    <span class="text-xs text-primary font-bold">${parseFloat(item.price||0).toFixed(2)} ${CONFIG.CURRENCY}</span>
                    <span class="text-xs text-gray-400">× ${item.qty}</span>
                </div>
            </div>
        </div>
        <button onclick="removeFromCart('${cid}')" class="p-2 text-red-400 hover:text-red-600 flex-shrink-0"><i class="ph ph-trash text-lg"></i></button>`;
        c.appendChild(d);
    });
    // Add delivery fee display
    const totalWithDelivery = total + DELIVERY_FEE;
    const summaryWrap = document.getElementById('cart-summary-wrap');
    const deliveryDisplay = document.getElementById('cart-delivery-display');
    const subtotalEl = document.getElementById('cart-subtotal-display');
    if(store.cart.length){
        if(summaryWrap) summaryWrap.style.display='flex';
        if(deliveryDisplay) deliveryDisplay.style.display='flex';
        if(subtotalEl) subtotalEl.textContent = `${total.toFixed(2)} ${CONFIG.CURRENCY}`;
    } else {
        if(summaryWrap) summaryWrap.style.display='none';
        if(deliveryDisplay) deliveryDisplay.style.display='none';
    }
    if(tot) tot.textContent = `${totalWithDelivery.toFixed(2)} ${CONFIG.CURRENCY}`;
}

const DELIVERY_FEE = 1; // أجور التوصيل

async function submitOrder(name, phone, address, notes, payment) {
    if (!store.cart.length) return showToast('السلة فارغة','error');
    const subtotal = store.cart.reduce((s,i)=>s+(parseFloat(i.price)||0)*(i.qty||1),0);
    const total = subtotal + DELIVERY_FEE;
    const orderId = 'ORD-' + Date.now();
    const productLines = store.cart.map(item => {
        let line = `${item.name}${item.qty>1?` x${item.qty}`:''}`;
        if (item.selectedVariants?.length) { const vs=item.selectedVariants.map(v=>v.name||v.value||'').filter(Boolean).join(', '); if(vs) line+=` (${vs})`; }
        return line;
    }).join(' + ');
    const orderData = {id:orderId,name,phone,address,product:productLines,price:total.toFixed(2),subtotal:subtotal.toFixed(2),delivery:DELIVERY_FEE.toFixed(2),branch:'المتجر الإلكتروني',notes:notes||'',status:'pending',payment,items:[...store.cart]};
    let msg = `🛍️ <b>طلب جديد! ${orderId}</b>\n👤 ${name}\n📱 ${phone}\n📍 ${address}\n━━━━━━━━\n`;
    store.cart.forEach(i=>{const vs=i.selectedVariants?.map(v=>v.name||v.value||'').filter(Boolean).join(', ')||'';msg+=`• ${i.name}${vs?` [${vs}]`:''} x${i.qty} — ${parseFloat(i.price).toFixed(2)} ${CONFIG.CURRENCY}\n`;});
    msg += `━━━━━━━━\n🚚 التوصيل: ${DELIVERY_FEE.toFixed(2)} ${CONFIG.CURRENCY}\n💰 <b>الإجمالي: ${total.toFixed(2)} ${CONFIG.CURRENCY}</b>\n💳 ${payment==='cod'?'عند الاستلام':payment==='whatsapp'?'واتساب':'شام كاش'}`;
    if(notes) msg+=`\n📝 ${notes}`;
    if(payment==='cod') {
        const ok=await insertOrder(orderData); await sendTG(msg);
        const cartSnapshot=[...store.cart];
        store.cart=[]; updateCartBadge(); closeModal('cart-modal');
        showToast(ok?'تم إرسال طلبك بنجاح! ✓':'تم إرسال طلبك ✓','success');
        // Show invoice for COD
        setTimeout(()=>showInvoice({orderId,name,phone,address,notes,payment,items:cartSnapshot,subtotal,total}),600);
    } else {
        await sendTG(msg);
        let waText=`مرحباً، ${payment==='shamcash'?'أود إكمال الدفع عبر شام كاش':'اكمال الطلب عبر واتساب'} للطلب التالي:\n\nرقم الطلب: ${orderId}\nالاسم: ${name}\nالهاتف: ${phone}\nالعنوان: ${address}\n\nالمنتجات:\n`;
        store.cart.forEach(i=>{const vs=i.selectedVariants?.map(v=>v.name||v.value||'').filter(Boolean).join(', ')||'';waText+=`- ${i.name}${vs?` (${vs})`:''} (الكمية: ${i.qty}) — ${(parseFloat(i.price)*i.qty).toFixed(2)} ${CONFIG.CURRENCY}\n`;});
        waText+=`\n🚚 التوصيل: ${DELIVERY_FEE.toFixed(2)} ${CONFIG.CURRENCY}\n💰 الإجمالي: ${total.toFixed(2)} ${CONFIG.CURRENCY}\n\nملاحظات: ${notes||'لا يوجد'}`;
        const cartSnapshot=[...store.cart];
        store.cart=[]; updateCartBadge(); closeModal('cart-modal');
        showToast('جاري تحويلك إلى واتساب...','success');
        setTimeout(()=>window.open(`https://wa.me/${CONFIG.WHATSAPP_NUMBER}?text=${encodeURIComponent(waText)}`,'_blank'),1000);
    }
}

function renderOffers(){
    // Remove existing offers section if any
    const existing = document.getElementById('offers-section');
    if(existing) existing.remove();
    
    const offers = store.offers || [];
    if(!offers.length) return;
    
    const area = document.querySelector('[data-container="products-area"]');
    if(!area) return;
    
    const section = document.createElement('section');
    section.id = 'offers-section';
    section.className = 'mt-6 px-4 pb-4';
    
    const header = document.createElement('div');
    header.className = 'flex items-center justify-between mb-4';
    header.innerHTML = '<h3 class="font-medium text-[18px]">العروض الحالية</h3><span class="text-xs text-primary font-bold bg-red-50 px-3 py-1 rounded-full">' + offers.length + ' عرض</span>';
    section.appendChild(header);
    
    const now = new Date();
    offers.forEach(offer => {
        const isExpired = offer.end_date && new Date(offer.end_date) < now;
        const card = document.createElement('div');
        card.className = 'offer-card' + (isExpired?' offer-expired':'');
        card.onclick = () => openOfferDetail(offer);
        
        const daysLeft = offer.end_date ? Math.ceil((new Date(offer.end_date)-now)/(1000*60*60*24)) : null;
        
        card.innerHTML = `
        <div style="position:relative;">
            ${offer.images?.[0]||offer.image ? `<img src="${offer.images?.[0]||offer.image}" style="width:100%;height:180px;object-fit:cover;display:block;">` : 
              '<div style="width:100%;height:180px;background:linear-gradient(135deg,#C41230,#ff4d6d);display:flex;align-items:center;justify-content:center;"><i class="ph ph-tag" style="font-size:48px;color:rgba(255,255,255,0.5);"></i></div>'}
            <div class="offer-badge">${isExpired?'انتهى':daysLeft!==null&&daysLeft<=3?`آخر ${daysLeft} أيام`:'عرض خاص'}</div>
        </div>
        <div style="padding:14px;">
            <h4 style="font-size:15px;font-weight:700;color:#111;margin:0 0 6px;">${offer.title||'عرض مميز'}</h4>
            ${offer.description?`<p style="font-size:12.5px;color:#666;line-height:1.6;margin:0 0 10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${offer.description}</p>`:''}
            <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:#888;">
                <i class="ph ph-calendar-blank"></i>
                <span>${offer.end_date?`ينتهي: ${new Date(offer.end_date).toLocaleDateString('ar-EG')}`:'عرض مستمر'}</span>
            </div>
        </div>`;
        section.appendChild(card);
    });
    
    area.insertBefore(section, area.firstChild);
}

function openOfferDetail(offer){
    const modal = document.getElementById('offer-detail-modal');
    if(!modal) return;
    
    const content = document.getElementById('offer-detail-content');
    const now = new Date();
    const isExpired = offer.end_date && new Date(offer.end_date) < now;
    const images = Array.isArray(offer.images) && offer.images.length ? offer.images : (offer.image?[offer.image]:[]);
    
    let slidesHTML = '';
    let dotsHTML = '';
    if(images.length) {
        slidesHTML = images.map((img,i)=>`<div style="min-width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;"><img src="${img}" style="width:100%;height:100%;object-fit:cover;"></div>`).join('');
        if(images.length>1) dotsHTML = images.map((_,i)=>`<div onclick="_offerGoTo(${i})" style="width:${i===0?'18':'6'}px;height:6px;border-radius:9999px;background:${i===0?'#C41230':'#d1d5db'};transition:all 0.3s;cursor:pointer;" class="offer-dot"></div>`).join('');
    }
    
    content.innerHTML = `
    <div style="position:relative;height:260px;background:#f5f5f5;overflow:hidden;">
        <div id="offer-slides" style="display:flex;height:100%;transition:transform 0.3s;">
            ${slidesHTML||'<div style="width:100%;display:flex;align-items:center;justify-content:center;"><i class="ph ph-tag" style="font-size:48px;color:#ccc;"></i></div>'}
        </div>
        ${dotsHTML?`<div style="position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:6px;">${dotsHTML}</div>`:''}
    </div>
    <div style="padding:16px;">
        ${isExpired?'<div style="background:#fee2e2;color:#ef4444;font-size:11px;font-weight:700;padding:6px 12px;border-radius:8px;display:inline-block;margin-bottom:12px;">انتهى هذا العرض</div>':''}
        <h2 style="font-size:19px;font-weight:800;color:#111;margin:0 0 8px;">${offer.title||'عرض مميز'}</h2>
        ${offer.end_date?`<div style="display:flex;align-items:center;gap:6px;font-size:12px;color:#888;margin-bottom:12px;"><i class="ph ph-calendar-blank"></i><span>${isExpired?'انتهى في:':'ينتهي في:'} ${new Date(offer.end_date).toLocaleDateString('ar-EG')}</span></div>`:''}
        ${offer.description?`<div style="font-size:13.5px;color:#555;line-height:1.8;white-space:pre-line;">${offer.description}</div>`:''}
    </div>`;
    
    window._offerSlideIdx = 0;
    window._offerGoTo = function(i){
        const slides = document.getElementById('offer-slides');
        window._offerSlideIdx = i;
        if(slides) slides.style.transform = `translateX(${i*100}%)`;
        document.querySelectorAll('.offer-dot').forEach((d,idx)=>{
            d.style.background = idx===i?'#C41230':'#d1d5db';
            d.style.width = idx===i?'18px':'6px';
        });
    };
    
    openModal('offer-detail-modal');
}

async function renderCommentsList() {
    const c = document.getElementById('comments-list'); if(!c) return;
    c.innerHTML=`<div class="text-center py-6"><div class="inline-block w-6 h-6 border-2 border-primary border-t-transparent rounded-full animate-spin"></div></div>`;
    const comments = await fetchComments();
    if(!comments.length){c.innerHTML=`<div class="text-center text-gray-400 py-6 text-sm">لا توجد تقييمات بعد!</div>`;return;}
    const frag=document.createDocumentFragment();
    comments.forEach(cm=>{
        const d=document.createElement('div'); d.className='bg-light p-3 rounded-[12px]';
        const dateStr=cm.created_at?new Date(cm.created_at).toLocaleDateString('ar-EG'):'';
        d.innerHTML=`<div class="flex justify-between items-center mb-1"><span class="text-sm font-bold">${cm.name||'مجهول'}</span><div class="flex items-center gap-2"><span class="text-[10px] text-gray-400">${dateStr}</span><div class="flex text-yellow-400 text-[11px]">${'<i class="ph-fill ph-star"></i>'.repeat(5)}</div></div></div><p class="text-xs text-gray-600 leading-relaxed">${cm.text||''}</p>`;
        frag.appendChild(d);
    });
    c.innerHTML=''; c.appendChild(frag);
}
async function submitNewComment(){
    const nameEl=document.getElementById('comm-name'),textEl=document.getElementById('comm-text');
    const name=nameEl?.value?.trim(),text=textEl?.value?.trim();
    if(!name||!text) return showToast('يرجى إدخال الاسم والتقييم','error');
    nameEl.value=''; textEl.value='';
    const ok=await insertComment({name,text});
    renderCommentsList();
    showToast(ok?'تم إضافة تقييمك بنجاح ✓':'تم الحفظ','success');
}

let searchOpen=false;

window.performSearch=function(query){
    const q=query.trim().toLowerCase();
    const area=document.querySelector('[data-container="products-area"]');
    if(!q){showAllProducts();return;}
    area.querySelectorAll('section[data-category-section]').forEach(s=>s.style.display='none');
    const matched=store.products.filter(p=>p.name?.toLowerCase().includes(q));
    let temp=document.getElementById('search-results-section'); if(temp)temp.remove();
    temp=document.createElement('section'); temp.id='search-results-section'; temp.className='mt-6';
    if(!matched.length){temp.innerHTML=`<div class="text-center py-10 text-gray-400 px-4"><i class="ph ph-magnifying-glass text-4xl block mb-2 opacity-40"></i><p class="text-sm">لا توجد نتائج لـ "${query}"</p></div>`;area.appendChild(temp);return;}
    temp.innerHTML=`<h3 class="font-medium text-[18px] px-4 mb-4">نتائج البحث (${matched.length})</h3><div class="flex overflow-x-auto hide-scrollbar gap-4 px-4 pb-6 sr-row"></div>`;
    const row=temp.querySelector('.sr-row');
    matched.forEach(prod=>{
        const imgUrl=prod.images?.[0]||'';
        const card=document.createElement('div'); card.className='min-w-[160px] w-[160px] bg-white rounded-[12px] shadow-soft p-3 flex flex-col flex-shrink-0'; card.style.cursor='pointer';
        card.innerHTML=`<div class="h-28 rounded-[8px] mb-3 flex items-center justify-center p-2 overflow-hidden">${imgUrl?`<img src="${imgUrl}" class="h-full w-auto object-contain img-blend">`:`<i class="ph ph-image text-4xl text-gray-300"></i>`}</div><h4 class="text-[13px] font-medium text-dark leading-tight mb-3 line-clamp-2 flex-1">${prod.name}</h4><div class="flex justify-between items-center"><span class="text-primary font-bold text-base" dir="ltr">${CONFIG.CURRENCY}${parseFloat(prod.price||0).toFixed(2)}</span><button class="sr-open w-8 h-8 rounded-[8px] bg-light flex items-center justify-center text-gray-700 hover:bg-primary hover:text-white transition-colors"><i class="ph ph-eye text-[18px]"></i></button></div>`;
        card.addEventListener('click',e=>{if(e.target.closest('.sr-open'))return;openProductModal(prod.id);});
        card.querySelector('.sr-open').addEventListener('click',e=>{e.stopPropagation();openProductModal(prod.id);});
        row.appendChild(card);
    });
    area.appendChild(temp);
};

// [7] PRODUCT MODAL — preview with variants & image switch
// ══════════════════════════════════════════════
let _pmIdx=0, _pmImgs=[], _pmId=null, _pmQty=1;

function openProductModal(productId){
    const prod=store.products.find(p=>p.id===productId); if(!prod)return;
    _pmId=productId; _pmImgs=Array.isArray(prod.images)&&prod.images.length?prod.images:[]; _pmIdx=0; _pmQty=1;

    document.getElementById('product-modal-name').textContent=prod.name||'';
    const priceEl=document.getElementById('product-modal-price');
    const base=parseFloat(prod.price||0);
    priceEl.textContent=`${CONFIG.CURRENCY}${base.toFixed(2)}`;
    priceEl.dataset.basePrice=base; delete priceEl.dataset.selectedPrice;

    const descEl=document.getElementById('product-modal-description');
    if(prod.description?.trim()){descEl.textContent=prod.description.trim();descEl.classList.remove('hidden');}
    else descEl.classList.add('hidden');

    document.getElementById('product-qty-display').textContent='1';

    // ── Build slides (images + optional video) ──
    const sc=document.getElementById('product-modal-slides');
    const dc=document.getElementById('product-modal-dots');
    const prevB=document.getElementById('product-modal-prev');
    const nextB=document.getElementById('product-modal-next');
    sc.innerHTML=''; dc.innerHTML='';

    const allSlides=[..._pmImgs];
    if(prod.video_url?.trim()) allSlides.push({_type:'video',url:prod.video_url.trim()});

    if(!allSlides.length){
        sc.innerHTML=`<div style="min-width:100%;height:100%;display:flex;align-items:center;justify-content:center;"><i class="ph ph-image" style="font-size:48px;color:#ccc;"></i></div>`;
        prevB.classList.add('hidden'); nextB.classList.add('hidden');
    } else {
        allSlides.forEach((item,i)=>{
            const sl=document.createElement('div');
            sl.style.cssText='min-width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0;overflow:hidden;';
            if(item._type==='video'){
                let embedUrl=item.url.replace(/\?.*$/,'');
                if(!embedUrl.endsWith('/'))embedUrl+='/';
                embedUrl+='embed/';
                const iframe=document.createElement('iframe');
                iframe.src=embedUrl; iframe.style.cssText='width:100%;height:100%;border:none;';
                iframe.setAttribute('allowfullscreen',''); iframe.setAttribute('scrolling','no');
                sl.appendChild(iframe);
            } else {
                sl.style.padding='16px';
                const img=document.createElement('img'); img.src=item;
                img.style.cssText='max-width:100%;max-height:100%;object-fit:contain;mix-blend-mode:multiply;';
                sl.appendChild(img);
            }
            sc.appendChild(sl);
            const dot=document.createElement('div');
            dot.style.cssText=`height:6px;border-radius:9999px;background:${i===0?'#C41230':'#d1d5db'};transition:all 0.3s;cursor:pointer;width:${i===0?'18px':'6px'};`;
            dot.onclick=()=>_goToPMSlide(i);
            dc.appendChild(dot);
        });
        _pmImgs=allSlides;
        const showNav=allSlides.length>1;
        prevB.classList.toggle('hidden',!showNav); nextB.classList.toggle('hidden',!showNav);
    }
    _updatePMSlider();
    _renderVariants(prod);

    // [6] Product modal add button state
    const addBtn=document.getElementById('product-modal-add-btn');
    if(_isInCart(productId)){
        addBtn.innerHTML=`<i class="ph ph-shopping-bag text-lg"></i><span>عرض السلة</span>`;
        addBtn.className='w-full bg-dark text-white rounded-[10px] py-3.5 font-bold flex items-center justify-center gap-2 hover:bg-gray-800 transition-colors active:scale-[0.98]';
        // ④ close product modal first, THEN open cart — no overlap
        addBtn.onclick=()=>{ closeModal('product-modal'); setTimeout(()=>{ renderCartItems(); openModal('cart-modal'); }, 380); };
    } else {
        addBtn.innerHTML=`<i class="ph ph-shopping-cart text-lg"></i><span>إضافة للسلة</span>`;
        addBtn.className='w-full bg-primary text-white rounded-[10px] py-3.5 font-bold flex items-center justify-center gap-2 hover:bg-red-800 transition-colors active:scale-[0.98]';
        addBtn.onclick=productModalAddToCart;
    }

    document.getElementById('product-modal-video-wrap').classList.add('hidden');
    document.getElementById('product-modal-ig-wrap').classList.add('hidden');
    
    // Render similar products
    _renderSimilarProducts(prod);
    
    openModal('product-modal');
}

function _renderSimilarProducts(prod){
    let simWrap = document.getElementById('similar-products-wrap');
    if(!simWrap) return;
    
    const catIds = prod.category_ids || (prod.category_id ? [prod.category_id] : []);
    const similar = store.products.filter(p => 
        p.id !== prod.id && (p.category_ids||[p.category_id]||[]).some(cid=>catIds.includes(cid))
    ).slice(0,6);
    
    if(!similar.length){ simWrap.style.display='none'; return; }
    simWrap.style.display='block';
    
    const row = simWrap.querySelector('.similar-row');
    if(!row) return;
    row.innerHTML = '';
    
    similar.forEach(sp=>{
        const imgUrl = sp.images?.[0]||'';
        const card = document.createElement('div');
        card.style.cssText='min-width:130px;width:130px;border-radius:14px;overflow:hidden;background:white;flex-shrink:0;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.10);';
        card.innerHTML=`<div style="height:110px;background:#f5f5f5;overflow:hidden;">
            ${imgUrl?`<img src="${imgUrl}" style="width:100%;height:100%;object-fit:cover;">`:'<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;"><i class="ph ph-image" style="color:#ccc;font-size:28px;"></i></div>'}
        </div>
        <div style="padding:8px;">
            <div style="font-size:11.5px;font-weight:600;color:#111;line-height:1.3;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;">${sp.name}</div>
            <div style="font-size:13px;font-weight:700;color:#C41230;margin-top:4px;">${CONFIG.CURRENCY}${parseFloat(sp.price||0).toFixed(2)}</div>
        </div>`;
        card.onclick = ()=>{ closeModal('product-modal'); setTimeout(()=>openProductModal(sp.id),380); };
        row.appendChild(card);
    });
}

function _renderVariants(prod){
    const vc=document.getElementById('product-modal-variants'); if(!vc)return; vc.innerHTML='';
    if(!prod.options?.length)return;
    prod.options.forEach((opt,oi)=>{
        const gd=document.createElement('div'); gd.className='mt-3';
        const lb=document.createElement('p'); lb.className='text-xs text-gray-500 mb-2'; lb.textContent=opt.type||`خيار ${oi+1}`; gd.appendChild(lb);
        const bd=document.createElement('div'); bd.className='flex flex-wrap gap-2';
        function _applyVariantImage(imgUrl){
            if(!imgUrl)return;
            const idx=(prod.images||[]).indexOf(imgUrl);
            if(idx>=0&&idx!==_pmIdx){_pmIdx=idx;_updatePMSlider();}
            else if(idx<0){
                const sc2=document.getElementById('product-modal-slides');
                if(sc2){sc2.innerHTML=''; const sl=document.createElement('div'); sl.style.cssText='min-width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:16px;flex-shrink:0;'; const img2=document.createElement('img'); img2.src=imgUrl; img2.style.cssText='max-width:100%;max-height:100%;object-fit:contain;mix-blend-mode:multiply;'; sl.appendChild(img2); sc2.appendChild(sl); sc2.style.transform='translateX(0%)';}
            }
        }
        if(opt.affectsPrice){
            (opt.values||[]).forEach((v,vi)=>{
                const b=document.createElement('button'); b.className='px-3 py-1.5 text-xs rounded-[8px] border border-gray-200 bg-light text-dark transition-colors';
                b.textContent=`${v.name} — ${CONFIG.CURRENCY}${parseFloat(v.price||0).toFixed(2)}`;
                b.onclick=function(){ bd.querySelectorAll('button').forEach(x=>{x.classList.remove('border-primary','bg-red-50','text-primary');x.classList.add('border-gray-200','bg-light','text-dark');}); this.classList.remove('border-gray-200','bg-light','text-dark'); this.classList.add('border-primary','bg-red-50','text-primary'); const pe=document.getElementById('product-modal-price'); const up=parseFloat(v.price||0); pe.textContent=`${CONFIG.CURRENCY}${(up*(_pmQty||1)).toFixed(2)}`; pe.dataset.selectedPrice=v.price; if(v.image)_applyVariantImage(v.image); };
                if(vi===0)setTimeout(()=>b.click(),0);
                bd.appendChild(b);
            });
        } else {
            (opt.values||[]).forEach(v=>{
                const vName=typeof v==='string'?v:(v?.name||v); const vImg=typeof v==='object'?v?.image:null;
                const b=document.createElement('button'); b.className='px-3 py-1.5 text-xs rounded-[8px] border border-gray-200 bg-light text-dark transition-colors'; b.textContent=vName; b.dataset.variantValue=vName;
                b.onclick=function(){ bd.querySelectorAll('button').forEach(x=>{x.classList.remove('border-primary','bg-red-50','text-primary');x.classList.add('border-gray-200','bg-light','text-dark');}); this.classList.remove('border-gray-200','bg-light','text-dark'); this.classList.add('border-primary','bg-red-50','text-primary'); if(vImg)_applyVariantImage(vImg); };
                bd.appendChild(b);
            });
        }
        gd.appendChild(bd); vc.appendChild(gd);
    });
}

function _collectVariants(){ const vc=document.getElementById('product-modal-variants'); if(!vc)return[]; const sel=[]; vc.querySelectorAll('button.border-primary').forEach(b=>{ if(b.dataset.selectedPrice!==undefined)sel.push({name:b.textContent.split('—')[0].trim(),price:parseFloat(b.dataset.selectedPrice)}); else if(b.dataset.variantValue!==undefined)sel.push({value:b.dataset.variantValue}); }); return sel; }

function _updatePMSlider(){ const sc=document.getElementById('product-modal-slides'),dc=document.getElementById('product-modal-dots'); if(!sc)return; sc.style.transform=`translateX(${_pmIdx*100}%)`; const dots=dc?.children; if(dots)Array.from(dots).forEach((d,i)=>{d.style.background=i===_pmIdx?'#C41230':'#d1d5db';d.style.width=i===_pmIdx?'18px':'6px';}); }
function _goToPMSlide(i){ _pmIdx=i; _updatePMSlider(); }

window.productModalSlide=function(dir){ const t=_pmImgs.length; if(!t)return; _pmIdx=(_pmIdx+dir+t)%t; _updatePMSlider(); };
window.productModalChangeQty=function(dir){ if(!_pmId)return; const prod=store.products.find(p=>p.id===_pmId); const rawStock=prod?.stock!==undefined?parseInt(prod.stock):0; const stock=(rawStock&&rawStock>0)?rawStock:9999; _pmQty=Math.min(Math.max(1,_pmQty+dir),stock); document.getElementById('product-qty-display').textContent=_pmQty; const pe=document.getElementById('product-modal-price'); if(pe){const bp=pe.dataset.selectedPrice?parseFloat(pe.dataset.selectedPrice):parseFloat(pe.dataset.basePrice||0); pe.textContent=`${CONFIG.CURRENCY}${(bp*_pmQty).toFixed(2)}`;} };

function productModalAddToCart(){
    if(!_pmId)return;
    const prod=store.products.find(p=>p.id===_pmId); if(!prod)return;
    const rawStock2=prod.stock!==undefined?parseInt(prod.stock):0;
    const stock=(rawStock2&&rawStock2>0)?rawStock2:9999;
    const pe=document.getElementById('product-modal-price');
    const up=pe?.dataset.selectedPrice?parseFloat(pe.dataset.selectedPrice):parseFloat(prod.price||0);
    const sv=_collectVariants();
    const vk=sv.map(v=>v.name||v.value||'').join('|');
    const cid=_pmId+(vk?'__'+vk:'');
    const rq=_pmQty||1;
    const ex=store.cart.find(i=>i._cartId===cid);
    if(ex){ const nq=(ex.qty||1)+rq; ex.qty=Math.min(nq,stock); if(nq>stock)showToast(`الحد الأقصى (${stock})`,'error'); }
    else { store.cart.push({...prod,_cartId:cid,price:up,qty:Math.min(rq,stock),selectedVariants:sv.length?sv:undefined}); }
    localStorage.setItem('gmt_cart',JSON.stringify(store.cart));
    updateCartBadge();

    // [6] switch button to "view cart"
    const addBtn=document.getElementById('product-modal-add-btn');
    addBtn.innerHTML=`<i class="ph ph-shopping-bag text-lg"></i><span>عرض السلة</span>`;
    addBtn.className='w-full bg-dark text-white rounded-[10px] py-3.5 font-bold flex items-center justify-center gap-2 hover:bg-gray-800 transition-colors active:scale-[0.98]';
    // ④ close product first, then go to cart
    addBtn.onclick=()=>{ closeModal('product-modal'); setTimeout(()=>{ renderCartItems(); openModal('cart-modal'); }, 380); };
    showToast('تمت الإضافة للسلة ✓','success');
}
window.productModalAddToCart=productModalAddToCart;
window.openProductModal=openProductModal;

    if(offersBtn2) offersBtn2.onclick = e=>{e.preventDefault(); openOffersModal();};
    document.querySelector('[data-action="cart"]').onclick = e=>{e.preventDefault();renderCartItems();openModal('cart-modal');};
    document.querySelector('[data-action="grid"]').onclick = e=>{e.preventDefault();openCategoriesModal();};
    document.querySelector('[data-action="home"]').onclick = e=>{e.preventDefault();closeSearch();window.scrollTo({top:0,behavior:'smooth'});};
}

// ══════════════════════════════════════════════
// PROVINCE → BRANCH SYSTEM
// ══════════════════════════════════════════════
window.onGovChange = function(gov){
    const branchWrap = document.getElementById('branch-dropdown-wrap');
    const branchSelect = document.getElementById('cust-branch-select');
    const addressInput = document.getElementById('cust-address');
    if(!gov || !branchWrap || !branchSelect) return;
    
    // Get branches for this province from store data
    const branches = (store.branches || []).filter(b => b.province === gov);
    
    // Rebuild dropdown
    branchSelect.innerHTML = '<option value="">اختر فرعاً...</option>';
    branches.forEach(b => {
        const opt = document.createElement('option');
        opt.value = b.name; opt.textContent = b.name;
        branchSelect.appendChild(opt);
    });
    // Always add manual/home/main options
    branchSelect.innerHTML += `<option value="__manual__">إدخال يدوي</option><option value="__home__">توصيل للمنزل</option><option value="__main__">الفرع الرئيسي</option>`;
    
    branchWrap.classList.remove('hidden');
    if(addressInput) { addressInput.value = ''; addressInput.classList.add('hidden'); }
};

window.onBranchSelect = function(val){
    const addressInput = document.getElementById('cust-address');
    if(!addressInput) return;
    if(val === '__manual__'){
        addressInput.classList.remove('hidden');
        addressInput.value = '';
        addressInput.placeholder = 'أدخل الفرع أو المنطقة يدوياً';
        addressInput.focus();
    } else if(val === '__home__'){
        addressInput.classList.remove('hidden');
        addressInput.value = 'توصيل للمنزل';
    } else if(val === '__main__'){
        addressInput.classList.remove('hidden');
        addressInput.value = 'الفرع الرئيسي';
    } else if(val) {
        addressInput.classList.remove('hidden');
        addressInput.value = val;
    } else {
        addressInput.classList.add('hidden');
        addressInput.value = '';
    }
};

// ══════════════════════════════════════════════
// OFFERS MODAL (opened via button only)
// ══════════════════════════════════════════════
function openOffersModal(){
    const offers = store.offers || [];
    let modal = document.getElementById('offers-modal');
    if(!modal){
        modal = document.createElement('div');
        modal.id = 'offers-modal';
        modal.className = 'modal-overlay';
        modal.innerHTML = `<div class="modal-sheet">
            <div class="flex-shrink-0 px-5 pt-5 pb-3 flex justify-between items-center border-b border-gray-100">
                <h3 class="font-bold text-lg flex items-center gap-2"><i class="ph-fill ph-tag text-primary"></i> العروض الحالية</h3>
                <button onclick="closeModal('offers-modal')" class="w-8 h-8 rounded-full bg-light flex items-center justify-center text-gray-500"><i class="ph ph-x text-base"></i></button>
            </div>
            <div id="offers-list-content" class="flex-1 overflow-y-auto hide-scrollbar px-4 py-4"></div>
        </div>`;
        document.getElementById('dynamic-modals-container').appendChild(modal);
    }
    
    const content = document.getElementById('offers-list-content');
    const now = new Date();
    
    if(!offers.length){
        content.innerHTML = '<div class="text-center py-16 text-gray-400"><i class="ph ph-tag text-5xl block mb-3 opacity-30"></i><p class="text-sm font-medium">لا توجد عروض حالياً</p><p class="text-xs mt-1">تابعنا لمعرفة أحدث العروض!</p></div>';
    } else {
        content.innerHTML = '';
        offers.forEach(offer => {
            const isExpired = offer.end_date && new Date(offer.end_date) < now;
            const daysLeft = offer.end_date ? Math.ceil((new Date(offer.end_date)-now)/(1000*60*60*24)) : null;
            const card = document.createElement('div');
            card.className = 'offer-card' + (isExpired?' offer-expired':'');
            card.onclick = () => { closeModal('offers-modal'); setTimeout(()=>openOfferDetail(offer),200); };
            card.innerHTML = `
            <div style="position:relative;">
                ${offer.images?.[0]||offer.image ? `<img src="${offer.images?.[0]||offer.image}" style="width:100%;height:180px;object-fit:cover;display:block;">` : 
                  '<div style="width:100%;height:180px;background:linear-gradient(135deg,#C41230,#ff4d6d);display:flex;align-items:center;justify-content:center;"><i class="ph ph-tag" style="font-size:48px;color:rgba(255,255,255,0.5);"></i></div>'}
                <div class="offer-badge">${isExpired?'انتهى':daysLeft!==null&&daysLeft<=3?`آخر ${daysLeft} أيام`:'عرض خاص'}</div>
            </div>
            <div style="padding:14px;">
                <h4 style="font-size:15px;font-weight:700;color:#111;margin:0 0 6px;">${offer.title||'عرض مميز'}</h4>
                ${offer.description?`<p style="font-size:12.5px;color:#666;line-height:1.6;margin:0 0 10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${offer.description}</p>`:''}
                <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:#888;">
                    <i class="ph ph-calendar-blank"></i>
                    <span>${offer.end_date?`ينتهي: ${new Date(offer.end_date).toLocaleDateString('ar-EG')}`:'عرض مستمر'}</span>
                </div>
            </div>`;
            content.appendChild(card);
        });
    }
    openModal('offers-modal');
}
window.openOffersModal = openOffersModal;


function showToast(msg,type='success'){
    const ex=document.getElementById('gmt-toast'); if(ex)ex.remove();
    const t=document.createElement('div'); t.id='gmt-toast';
    t.className=`fixed top-20 left-1/2 transform -translate-x-1/2 z-[300] ${type==='success'?'bg-gray-900':'bg-red-600'} text-white text-sm font-medium px-5 py-3 rounded-full shadow-lg transition-all duration-300 opacity-0`;
    t.textContent=msg; document.body.appendChild(t);
    requestAnimationFrame(()=>{t.style.opacity='1';});
    setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300);},2500);
}

// ══════════════════════════════════════════════
// INTRO
// ══════════════════════════════════════════════
const _INTRO_MIN_MS=3200;
let _introStart=0, _contentReady=false;

function _tryCloseIntro(){
    if(!_contentReady)return;
    const elapsed=Date.now()-_introStart;
    const wait=Math.max(0,_INTRO_MIN_MS-elapsed);
    setTimeout(_doCloseIntro,wait);
}
function _doCloseIntro(){
    const imgs=Array.from(document.querySelectorAll('img:not(#intro-screen img)'));
    const pending=imgs.filter(img=>!img.complete||img.naturalWidth===0);
    function _closeAll(){ const scr=document.getElementById('intro-screen'); if(scr){scr.classList.add('hide');setTimeout(()=>{if(scr.parentNode)scr.remove();},850);} }
    if(!pending.length){_closeAll();return;}
    let resolved=0;
    const timeout=setTimeout(_closeAll,5000);
    pending.forEach(img=>{const finish=()=>{resolved++;if(resolved>=pending.length){clearTimeout(timeout);_closeAll();}};img.addEventListener('load',finish,{once:true});img.addEventListener('error',finish,{once:true});});
}


// ══════════════════════════════════════════════
// NOTIFICATION SYSTEM
// ══════════════════════════════════════════════
function initNotifications(){
    if(!('Notification' in window) || !('serviceWorker' in navigator)) return;
    if(Notification.permission==='granted') return; // already granted
    if(localStorage.getItem('gmt_notif_dismissed')) return;
    // Show prompt after 4 seconds
    setTimeout(()=>{
        const prompt=document.getElementById('notif-prompt');
        if(prompt) prompt.classList.add('show');
    },4000);
}

window.requestNotifPermission = async function(){
    dismissNotifPrompt();
    if(!('Notification' in window)) return;
    try {
        const perm = await Notification.requestPermission();
        if(perm==='granted'){
            showToast('سيتم إرسال إشعارات العروض ✓','success');
            localStorage.setItem('gmt_notif_granted','1');
        }
    } catch(e){ console.warn('Notifications not supported'); }
};

window.dismissNotifPrompt = function(){
    const prompt=document.getElementById('notif-prompt');
    if(prompt){ prompt.classList.remove('show'); }
    localStorage.setItem('gmt_notif_dismissed','1');
};

function sendLocalNotification(title, body){
    if(Notification.permission!=='granted') return;
    try { new Notification(title,{body,icon:'logo.jpg',badge:'logo.jpg'}); }
    catch(e){ console.warn('Notif error',e); }
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
async function initStore(){
    _introStart=Date.now();
    createModals(); updateCartBadge(); setupEventHandlers(); initNotifications();

    const cached=_cache.get('store');
    if(cached){ _applyRecord(cached); renderAll(); _contentReady=true; _tryCloseIntro(); _refreshBackground(); return; }

    try {
        const rec=await fetchStoreRecord();
        if(rec) _applyRecord(rec);
        else _applyMock();
    } catch { _applyMock(); }

    renderAll();
    _contentReady=true; _tryCloseIntro();
}

function _applyRecord(rec){
    store.categories   = Array.isArray(rec.categories)   ? rec.categories   : MOCK.categories;
    store.products     = Array.isArray(rec.products)      ? rec.products     : MOCK.products;
    store.banners      = Array.isArray(rec.banners)       ? rec.banners      : MOCK.banners;
    store.offers       = Array.isArray(rec.offers)        ? rec.offers       : [];
    store.branches     = Array.isArray(rec.branches)      ? rec.branches     : [];
    // Check for new offer notification
    _checkNewOfferNotification(store.offers);
}

function _checkNewOfferNotification(offers){
    if(!offers.length) return;
    const lastSeen = parseInt(localStorage.getItem('gmt_offers_last_seen')||'0');
    const newOffers = offers.filter(o => {
        const ts = o.created_at ? new Date(o.created_at).getTime() : 0;
        return ts > lastSeen;
    });
    if(newOffers.length && Notification.permission==='granted'){
        newOffers.forEach(o=>{
            sendLocalNotification('عرض جديد! 🎉', o.title||'تحقق من العروض الجديدة');
        });
        localStorage.setItem('gmt_offers_last_seen', Date.now().toString());
    }
}

function _applyMock(){
    store.categories=MOCK.categories;
    store.products=MOCK.products;
    store.banners=MOCK.banners;
}

function renderAll(){
    renderMainBanner(store.banners);
    renderCategories();
    renderProducts();
    // Offers are NOT shown on homepage — only via the Offers button
}

async function _refreshBackground(){
    try {
        _cache.del('store');
        const rec=await fetchStoreRecord(); if(!rec)return;
        const newCats=Array.isArray(rec.categories)?rec.categories:store.categories;
        const newProds=Array.isArray(rec.products)?rec.products:store.products;
        if(JSON.stringify(newProds)!==JSON.stringify(store.products)||JSON.stringify(newCats)!==JSON.stringify(store.categories)){
            _applyRecord(rec); renderAll();
        }
    } catch {}
}

document.addEventListener('DOMContentLoaded', initStore);
</script>
